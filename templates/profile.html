{% extends "base.html" %}

{% block title %}Profile - FinBank{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/profile.css') }}">
{% endblock %}

{% block content %}
<div class="card profile-card">
    <h2>Your Profile</h2>
    <div id="profile-info">
        <p><strong>Username:</strong> <span id="username"></span> <span id="role-badge" class="badge"></span></p>
        <p><strong>Email:</strong> <span id="email"></span></p>
        <p><strong>Role:</strong> <span id="role"></span></p>
        <p><strong>Balance:</strong> <span id="balance"></span></p>
    </div>
    
    <h3>Update Profile</h3>
    <form id="profileForm">
        <div class="form-group">
            <label for="new-email">New Email (optional)</label>
            <input type="email" id="new-email">
        </div>
        <div class="form-group">
            <label for="new-password">New Password (optional)</label>
            <input type="password" id="new-password">
        </div>
        <div id="message" class="alert" style="display: none;"></div>
        <button type="submit" class="btn btn-primary">Update</button>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/profile.js') }}"></script>
{% endblock %}
