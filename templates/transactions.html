{% extends "base.html" %}

{% block title %}Transaction History - FinBank{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/transactions.css') }}">
{% endblock %}

{% block content %}
<div class="card">
    <h2>Transaction History</h2>
    <div class="pagination-controls">
        <button id="prevPage" class="btn" disabled>Previous</button>
        <span id="pageInfo">Page 1</span>
        <button id="nextPage" class="btn">Next</button>
        <select id="perPage">
            <option value="5">5 per page</option>
            <option value="10" selected>10 per page</option>
            <option value="20">20 per page</option>
        </select>
    </div>
    <table class="transaction-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Type</th>
                <th>From/To</th>
                <th>Amount</th>
                <th>Description</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody id="transaction-list">
            <tr><td colspan="6">Loading...</td></tr>
        </tbody>
    </table>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/transactions.js') }}"></script>
{% endblock %}
