{% extends "base.html" %}

{% block title %}Transfer Money - FinBank{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/transfer.css') }}">
{% endblock %}

{% block content %}
<div class="card transfer-card">
    <h2>Transfer Money</h2>
    <form id="transferForm">
        <div class="form-group">
            <label for="to_username">Recipient Username</label>
            <input type="text" id="to_username" name="to_username" required>
        </div>
        <div class="form-group">
            <label for="amount">Amount (₹)</label>
            <input type="number" id="amount" name="amount" step="0.01" min="0.01" required>
        </div>
        <div class="form-group">
            <label for="description">Description (optional)</label>
            <input type="text" id="description" name="description">
        </div>
        <div id="message" class="alert" style="display: none;"></div>
        <button type="submit" class="btn btn-primary">Send Money</button>
        <a href="/dashboard" class="btn">Cancel</a>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/transfer.js') }}"></script>
{% endblock %}
